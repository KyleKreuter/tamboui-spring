name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build TamboUI submodule
        run: cd libs/tamboui && ./gradlew publishToMavenLocal --no-daemon -x test

      - name: Build and Test
        run: ./mvnw --no-transfer-progress --batch-mode verify
